<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ ZAMAN Wallet Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.7;
      word-break: break-all;
    }

    .label {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <h1>AZ ZAMAN REAL WALLET</h1>

  <button onclick="generateWallet()">Generate Wallet</button>

  <div id="output"></div>

  <script>
    function randomString(length) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
      }
      return result;
    }

    function generateWallet() {
      const publicKey = "G" + randomString(55);
      const secretKey = "S" + randomString(55);

      document.getElementById("output").innerHTML =
        "<div class='label'>PUBLIC KEY:</div>" +
        publicKey +
        "<br><br>" +
        "<div class='label'>SECRET KEY:</div>" +
        secretKey;
    }
  </script>

</body>
</html>
