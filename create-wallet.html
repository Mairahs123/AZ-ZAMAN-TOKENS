<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ ZAMAN REAL WALLET</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/10.4.1/stellar-sdk.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:28px;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    background:#6f42c1;
    color:white;
    border:none;
    border-radius:12px;
    margin-top:20px;
}

#output{
    margin-top:20px;
    padding:15px;
    background:#f7f7f7;
    border-radius:12px;
    word-break:break-all;
}
</style>
</head>

<body>

<div class="container">
    <h1>AZ ZAMAN REAL WALLET</h1>
    <button onclick="generateWallet()">Generate Wallet</button>
    <div id="output"></div>
</div>

<script>
function generateWallet(){
    const pair = StellarSdk.Keypair.random();

    document.getElementById("output").innerHTML =
        "<b>PUBLIC KEY:</b><br>" + pair.publicKey() +
        "<br><br><b>SECRET KEY:</b><br>" + pair.secret();
}
</script>

</body>
</html>
